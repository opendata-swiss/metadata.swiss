<!-- UML Deployment Diagram: CMS Content PR Previews -->
<svg width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- Developer Node -->
  <g>
    <rect x="30" y="40" width="140" height="60" rx="10" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <text x="100" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="100" y="80" font-size="14" text-anchor="middle" fill="#333">Developer</text>
  </g>
  <!-- CMS Content Repo Node -->
  <g>
    <rect x="200" y="40" width="180" height="60" rx="10" fill="#f0e0ff" stroke="#333" stroke-width="2"/>
    <text x="290" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="290" y="80" font-size="14" text-anchor="middle" fill="#333">CMS Content Repo</text>
    <rect x="230" y="90" width="120" height="30" fill="#fff" stroke="#333" stroke-dasharray="3,2"/>
    <text x="290" y="110" font-size="12" text-anchor="middle" fill="#333">PR (INT/TEST)</text>
  </g>
  <!-- CI/CD Node -->
  <g>
    <rect x="420" y="40" width="120" height="60" rx="10" fill="#ffe0b2" stroke="#333" stroke-width="2"/>
    <text x="480" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="480" y="80" font-size="14" text-anchor="middle" fill="#333">CI/CD</text>
  </g>
  <!-- K8s Cluster Node -->
  <g>
    <rect x="600" y="40" width="180" height="180" rx="10" fill="#e0f7fa" stroke="#333" stroke-width="2"/>
    <text x="690" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="690" y="80" font-size="14" text-anchor="middle" fill="#333">K8s Cluster</text>
    <!-- Preview Artifact (INT/TEST) -->
    <rect x="630" y="100" width="120" height="30" fill="#d1ffd6" stroke="#333"/>
    <text x="690" y="120" font-size="12" text-anchor="middle" fill="#333">«artifact» Preview (INT/TEST)</text>
    <text x="690" y="150" font-size="11" text-anchor="middle" fill="#333">[App Starts]</text>
  </g>
  <!-- CMS Content Repo Node (runtime) -->
  <g>
    <rect x="600" y="260" width="180" height="60" rx="10" fill="#f0e0ff" stroke="#333" stroke-width="2"/>
    <text x="690" y="280" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="690" y="300" font-size="14" text-anchor="middle" fill="#333">CMS Content Repo</text>
  </g>
  <!-- Communication/Deployment Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <line x1="170" y1="70" x2="200" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="380" y1="70" x2="420" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="540" y1="70" x2="600" y2="115" stroke="#333" marker-end="url(#arrow)"/>
  <!-- Deployment (mount) from CMS Content Repo to K8s Cluster -->
  <line x1="690" y1="260" x2="690" y2="150" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="630" y="230" font-size="12" fill="#7c3aed" text-anchor="end">«deploy» content mounted at runtime</text>
</svg>

