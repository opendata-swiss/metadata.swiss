<!-- UML Deployment Diagram: App PR Previews -->
<svg width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- Developer Node -->
  <g>
    <rect x="30" y="40" width="120" height="60" rx="10" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <text x="90" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="90" y="80" font-size="14" text-anchor="middle" fill="#333">Developer</text>
  </g>
  <!-- GitHub Node -->
  <g>
    <rect x="180" y="40" width="120" height="60" rx="10" fill="#cce5ff" stroke="#333" stroke-width="2"/>
    <text x="240" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="240" y="80" font-size="14" text-anchor="middle" fill="#333">GitHub</text>
    <rect x="200" y="90" width="80" height="30" fill="#fff" stroke="#333" stroke-dasharray="3,2"/>
    <text x="240" y="110" font-size="12" text-anchor="middle" fill="#333">PR</text>
  </g>
  <!-- CI/CD Node -->
  <g>
    <rect x="340" y="40" width="120" height="60" rx="10" fill="#ffe0b2" stroke="#333" stroke-width="2"/>
    <text x="400" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="400" y="80" font-size="14" text-anchor="middle" fill="#333">CI/CD</text>
  </g>
  <!-- K8s Cluster Node -->
  <g>
    <rect x="680" y="40" width="160" height="180" rx="10" fill="#e0f7fa" stroke="#333" stroke-width="2"/>
    <text x="760" y="60" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="760" y="80" font-size="14" text-anchor="middle" fill="#333">K8s Cluster</text>
    <!-- INT Preview Artifact -->
    <rect x="700" y="100" width="120" height="30" fill="#d1ffd6" stroke="#333"/>
    <text x="760" y="120" font-size="12" text-anchor="middle" fill="#333">«artifact» INT Preview</text>
    <!-- TEST Preview Artifact -->
    <rect x="700" y="140" width="120" height="30" fill="#fffad1" stroke="#333"/>
    <text x="760" y="160" font-size="12" text-anchor="middle" fill="#333">«artifact» TEST Preview</text>
    <text x="760" y="190" font-size="11" text-anchor="middle" fill="#333">[App Starts]</text>
  </g>
  <!-- CMS Content Repos Node -->
  <g>
    <rect x="680" y="260" width="160" height="60" rx="10" fill="#f0e0ff" stroke="#333" stroke-width="2"/>
    <text x="760" y="280" font-size="12" text-anchor="middle" fill="#333">«node»</text>
    <text x="760" y="300" font-size="14" text-anchor="middle" fill="#333">CMS Content Repos</text>
  </g>
  <!-- Communication/Deployment Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <line x1="150" y1="70" x2="180" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="300" y1="70" x2="340" y2="70" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="460" y1="70" x2="680" y2="115" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="460" y1="70" x2="680" y2="155" stroke="#333" marker-end="url(#arrow)"/>
  <!-- Deployment (mount) from CMS Content Repos to K8s Cluster -->
  <line x1="760" y1="260" x2="760" y2="190" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="690" y="230" font-size="12" fill="#7c3aed" text-anchor="end">«deploy» content mounted at runtime</text>
</svg>

