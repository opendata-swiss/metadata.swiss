apiVersion: apps/v1
kind: Deployment
metadata:
  name: piveau-ui
spec:
  template:
    spec:
      containers:
        - name: piveau-ui
          image: ghcr.io/opendata-swiss/ods-ui
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: NUXT_PUBLIC_PIVEAU_HUB_SEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: public-endpoints
                  key: hub-search-endpoint
            - name: NUXT_PUBLIC_PIVEAU_HUB_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: public-endpoints
                  key: hub-repo-endpoint

            - name: NUXT_OAUTH_KEYCLOAK_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: auth-ui
                  key: server-url
            - name: NUXT_OAUTH_KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: auth-ui
                  key: realm
            - name: NUXT_OAUTH_KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-ui
                  key: client-id
            - name: NUXT_OAUTH_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-ui
                  key: client-secret
            - name: NUXT_SESSION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-ui
                  key: session-password

            - name: GITHUB_OWNER
              valueFrom:
                configMapKeyRef:
                  name: public-endpoints
                  key: github-owner
            - name: GITHUB_REPO
              valueFrom:
                configMapKeyRef:
                  name: public-endpoints
                  key: github-repo
            - name: GITHUB_BASE_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: public-endpoints
                  key: github-base-branch
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: piveau-ui-github-app
                  key: app-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: piveau-ui-github-app
                  key: private-key
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: piveau-ui-github-app
                  key: installation-id
          resources:
            limits:
              memory: 2Gi
            requests:
              memory: 1Gi
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    case "$GITHUB_REPO" in
                      opendata-swiss-cms-content-int)
                        ENVIRONMENT="INT" ;;
                      opendata-swiss-cms-content)
                        ENVIRONMENT="PROD" ;;
                      *)
                        ENVIRONMENT="TEST" ;;
                    esac
                    curl -X POST \
                      -H "Authorization: Bearer $GITHUB_TOKEN" \
                      -H "Accept: application/vnd.github+json" \
                      https://api.github.com/repos/opendata-swiss/metadata.swiss/actions/workflows/script-manual-trigger.yaml/dispatches \
                      -d "{\"ref\":\"main\",\"inputs\":{\"environment\":\"$ENVIRONMENT\",\"action\":\"HARVEST_SHOWCASES\"}}"
