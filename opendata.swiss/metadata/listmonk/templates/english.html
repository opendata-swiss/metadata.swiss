<!DOCTYPE html>
<html>
<head>
    <title>Latest dataset updates</title>
</head>
<body>
<h1>Hello, {{.Subscriber.Name}}</h1>
<div>
    <ul>
    {{ range .Tx.Data.datasets }}
        <li>
            <a href="{{ $.Tx.Data.datasetPageBaseUrl }}{{ .id }}">{{ .title }}</a>
        </li>
    {{ end }}
    </ul>
</div>
<p>Unsubscribe: <a href="{{ .Tx.Data.unsubscribeLink }}">{{ .Tx.Data.unsubscribeLink }}</a></p>
</body>
</html>
