x-db-credentials: &db-credentials                             # Use the default POSTGRES_ credentials if they're available or simply default to "listmonk"
  POSTGRES_USER: &db-user listmonk                            # for database user, password, and database name
  POSTGRES_PASSWORD: &db-password listmonk
  POSTGRES_DB: &db-name listmonk

services:
  piveau-hub-repo:
    image: piveau/hub-repo:4.0.1
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - 8081:8080
      - 8085:8085
      - 5002:5000
    environment:
      - PIVEAU_HUB_API_KEY=${PIVEAU_HUB_API_KEY}
      - PIVEAU_HUB_SHELL_CONFIG={"http":{},"telnet":{}}
      - PIVEAU_TRIPLESTORE_CONFIG={"address":"http://graphdb:7200/repositories", "queryEndpoint":"/piveau", "queryAuthEndpoint":"/piveau/statements", "graphEndpoint":"/piveau/rdf-graphs/service", "graphAuthEndpoint":"/piveau/rdf-graphs/service"}
      - PIVEAU_HUB_VALIDATOR={"enabled":true,"metricsPipeName":"metrics","history":false}
      - PIVEAU_HUB_SEARCH_SERVICE=${PIVEAU_HUB_SEARCH_SERVICE}
      - JAVA_OPTS=-Xms1g -Xmx2g
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-hub-repo
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317
      - PIVEAU_FEATURE_FLAGS=${PIVEAU_FEATURE_FLAGS}
      - PIVEAU_PROFILE=${PIVEAU_PROFILE}
      - PIVEAU_HUB_BASE_URI=https://opendata.swiss/
      - PIVEAU_HUB_AUTHORIZATION_PROCESS_DATA=${PIVEAU_HUB_AUTHORIZATION_PROCESS_DATA}
    volumes:
      - ./piveau_system_pipes:/usr/verticles/pipes
      - ./piveau_profile:/piv-profile:ro

  piveau-hub-search:
    image: registry.gitlab.com/piveau/hub/piveau-hub-search:5.3.7
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - 8084:8080
      - 8086:8081
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - PIVEAU_HUB_SEARCH_API_KEY=${PIVEAU_HUB_SEARCH_API_KEY}
      - PIVEAU_HUB_SEARCH_ES_CONFIG=${PIVEAU_HUB_SEARCH_ES_CONFIG}
      - PIVEAU_HUB_SEARCH_GAZETTEER_CONFIG={"url":"http://doesnotmatter.eu"}
      - JAVA_OPTS=-Xms1g -Xmx2g
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-hub-search
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317
      - PIVEAU_FEATURE_FLAGS=${PIVEAU_FEATURE_FLAGS}
      - PIVEAU_PROFILE=${PIVEAU_PROFILE}
    volumes:
      - ./piveau_profile:/piv-profile:ro

  piveau-hub-ui:
    image: registry.gitlab.com/piveau/hub/piveau-hub-ui:v1.16.6
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - 8080:8080
    environment:
      - VITE_METADATA_TITLE=LINDASnext
      - VITE_API_BASE_URL=http://localhost:8084/
      - VITE_API_HUB_URL=http://localhost:8081/
      - VITE_AUTHENTICATION_KEYCLOAK_REALM=${VITE_AUTHENTICATION_KEYCLOAK_REALM}
      - VITE_AUTHENTICATION_KEYCLOAK_URL=${VITE_AUTHENTICATION_KEYCLOAK_URL}
      - VITE_AUTHENTICATION_KEYCLOAK_CLIENT_ID=${VITE_AUTHENTICATION_KEYCLOAK_CLIENT_ID}
      - VITE_ROUTING_ROUTER_OPTIONS_BASE=/

  piveau-ui:
    build: ../ui
    restart: unless-stopped
    ports:
      - 8008:80
    env_file:
      - .env
    environment:
      - NUXT_PUBLIC_PIVEAU_HUB_SEARCH_URL=http://localhost:8084/
      - NUXT_PUBLIC_PIVEAU_HUB_REPO_URL=http://localhost:8081/
      - GITHUB_OWNER=opendata-swiss
      - GITHUB_CMS_REPO=opendata-swiss-cms-content-test
      - GITHUB_APP_REPO=metadata.swiss

  ###########
  #### CONSUS
  ###########

  piveau-consus-importing-rdf:
    image: registry.gitlab.com/piveau/consus/piveau-consus-importing-rdf:1.10.4 # 1.10.5
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms200m -Xmx500m
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-consus-importing-rdf
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317

  piveau-consus-importing-ckan:
    image: registry.gitlab.com/piveau/consus/piveau-consus-importing-ckan:1.2.7
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms100m -Xmx200m
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-consus-importing-ckan
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317

  piveau-consus-transforming-js:
    image: registry.gitlab.com/piveau/consus/piveau-consus-transforming-js:4.1.0
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms200m -Xmx500m
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-consus-transforming-js
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317
    volumes:
      - ./piveau_scripts:/usr/verticles/scripts

  piveau-consus-exporting-hub:
    image: registry.gitlab.com/piveau/consus/piveau-consus-exporting-hub:8.0.0
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms200m -Xmx1g
      - PIVEAU_HUB_APIKEY=${PIVEAU_HUB_API_KEY}
      - OTEL_SDK_DISABLED=true
      - PIVEAU_PIPE_LOG_LEVEL=trace
      - PIVEAU_LOG_LEVEL=TRACE
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-consus-exporting-hub
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317

  piveau-consus-scheduling:
    image: registry.gitlab.com/piveau/consus/piveau-consus-scheduling:4.1.2
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - "8090:8080"
      - "8095:8085"
      - "5001:5000" # Just make it also work for macOS
    environment:
      - JAVA_OPTS=-Xms100m -Xmx200m
      - PIVEAU_SHELL_CONFIG={"telnet":{},"http":{}}
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=piveau-consus-scheduling
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317
    volumes:
      - ./piveau_pipes:/usr/verticles/pipes

  ############
  #### METRICS
  ############

  piveau-metrics-validating-shacl:
    image: registry.gitlab.com/piveau/metrics/piveau-metrics-validating-shacl:4.4.0
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - 8181:8080
    environment:
      - JAVA_OPTS=-Xms1g -Xmx2g
      - PIVEAU_LOG_LEVEL=trace
      - PIVEAU_PIPE_LOG_LEVEL=TRACE

  piveau-metrics-cache:
    image: registry.gitlab.com/piveau/metrics/piveau-metrics-cache:5.8.3
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - 8185:8080
    environment:
      - BASE_URI=https://opendata.swiss/
      - PIVEAU_DCATAP_SCHEMA_CONFIG={"baseUri":"https://opendata.swiss/"}
      - MONGODB_CONNECTION=mongodb://mongodb:27017
      - CACHE_APIKEY=${PIVEAU_METRICS_CACHE_API_KEY}
      - PIVEAU_TRIPLESTORE_CONFIG={"address":"http://graphdb:7200/repositories", "queryEndpoint":"/piveau", "queryAuthEndpoint":"/piveau/statements", "graphEndpoint":"/piveau/rdf-graphs/service", "graphAuthEndpoint":"/piveau/rdf-graphs/service"}
      - CACHE_CORS_DOMAINS=["localhost"]
      - JAVA_OPTS=-Xms1g -Xmx2g

  piveau-metrics-annotator:
    image: registry.gitlab.com/piveau/metrics/piveau-metrics-annotator:2.1.3
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms1g -Xmx2g
      - PIVEAU_LOG_LEVEL=trace
      - PIVEAU_PIPE_LOG_LEVEL=TRACE

  piveau-metrics-accessibility:
    image: registry.gitlab.com/piveau/metrics/piveau-metrics-accessibility:2.1.7
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - PIVEAU_ACCESSIBILITY_PERSISTENCE_CONFIG={"mongoDbClient":{"connection_string":"mongodb://mongodb:27017"},"collection":"datasets"}
      - JAVA_OPTS=-Xms1g -Xmx2g
      - PIVEAU_LOG_LEVEL=trace
      - PIVEAU_PIPE_LOG_LEVEL=TRACE

  piveau-metrics-score:
    image: registry.gitlab.com/piveau/metrics/piveau-metrics-score:3.2.2
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms1g -Xmx2g
      - PIVEAU_LOG_LEVEL=trace
      - PIVEAU_PIPE_LOG_LEVEL=TRACE

  graphdb:
    image: ontotext/graphdb:10.8.8
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ports:
      - 7200:7200
    command:
      - -Xms2g
      - -Xmx5g
      - -Ddefault.min.distinct.threshold=512m
      - -Dgraphdb.health.minimal.free.storage.enabled=false
      - -Dgraphdb.health.minimal.free.storage.asyncCheck=false
    volumes:
      - ./volumes/graphdb-data:/opt/graphdb/dist/data

  graphdb-create-repo:
    image: curlimages/curl:latest
    restart: "no" # Just run once
    depends_on:
      graphdb:
        condition: service_started
    command:
      - /config/setup.sh
    volumes:
      - ./config/graphdb:/config:ro

  mongodb:
    image: mongo:6.0.13
    restart: unless-stopped
    volumes:
      - ./volumes/mongodb-data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.3
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: curl -s -f http://elasticsearch:9200/_cat/health >/dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - 9200:9200
      - 9300:9300
    environment:
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2G -Xmx4G
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./volumes/elasticsearch-data:/usr/share/elasticsearch/data

  #################
  # OpenTelemetry #
  #################
  jaeger:
    image: docker.io/jaegertracing/all-in-one:1.75.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -nv -t1 --spider localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "16686:16686"
      - "4317:4317"

  collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.137.0
    restart: unless-stopped
    command: >-
      --config=/collector.yaml
    depends_on:
      jaeger:
        condition: service_healthy
    volumes:
      - ./config/collector.yaml:/collector.yaml:ro

  prometheus:
    image: docker.io/prom/prometheus:v3.7.3
    restart: unless-stopped
    command: >-
      --config.file=/prometheus.yaml
      --web.enable-lifecycle
    depends_on:
      - collector
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -nv -t1 --spider localhost:9090/-/healthy || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./config/prometheus.yaml:/prometheus.yaml:ro
    ports:
      - 9090:9090

  grafana:
    image: docker.io/grafana/grafana:12.3.0
    restart: unless-stopped
    ports:
      - 3001:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
    volumes:
      - ./config/grafana.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -nv -t1 --spider localhost:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################
  # Custom services  #
  ####################

  file-server:
    image: python:3.12-alpine
    restart: unless-stopped
    ports:
      - 8010:8000
    command: python -m http.server 8000 --directory /files
    volumes:
      - ./volumes/file-server:/files:ro
    
  piveau-consus-importing-csw:
    build: ../piveau_modules/piveau-consus-importing-csw
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - JAVA_OPTS=-Xms200m -Xmx500m
      #- PIVEAU_PIPE_LOG_LEVEL=TRACE
      - OTEL_SDK_DISABLED=true
      - CSW_IMPORT_DELAY=20

  piveau-consus-patching:
    build: ../piveau_modules/piveau-consus-patching
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"

  piveau-consus-filter:
    build: ../piveau_modules/piveau-consus-filter
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"

  piveau-consus-importing-showcases:
    build: ../piveau_modules/piveau-consus-importing-showcases
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
    environment:
      - SHOWCASE_API_ENDPOINT=${SHOWCASE_API_ENDPOINT:-http://piveau-ui/api/showcases}

  ####################
  # Listmonk         #
  ####################

  # listmonk app
  listmonk-app:
    image: listmonk/listmonk:latest
    container_name: listmonk_app
    restart: unless-stopped
    ports:
      - "9000:9000"                                           # To change the externally exposed port, change to: $custom_port:9000
    hostname: listmonk.example.com                            # Recommend using FQDN for hostname
    depends_on:
      - listmonk-db
    command: [sh, -c, "./listmonk --install --idempotent --yes --config '' 2> /listmonk/uploads/install.sh && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
      # --config (file) param is set to empty so that listmonk only uses the env vars (below) for config.
      # --install --idempotent ensures that DB installation happens only once on an empty DB, on the first ever start.
      # --upgrade automatically runs any DB migrations when a new image is pulled.


    env_file:
      - .env
    environment:                                              # The same params as in config.toml are passed as env vars here.
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__user: *db-user
      LISTMONK_db__password: *db-password
      LISTMONK_db__database: *db-name
      LISTMONK_db__host: listmonk-db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      LISTMONK_db__max_open: 25
      LISTMONK_db__max_idle: 25
      LISTMONK_db__max_lifetime: 300s
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-admin}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-password}
      LISTMONK_ADMIN_API_USER: ${LISTMONK_ADMIN_API_USER:-admin-api}
      TZ: Etc/UTC
    volumes:
      - ./listmonk:/listmonk/uploads:rw                        # Mount an uploads directory on the host to /listmonk/uploads inside the container.
      # To use this, change directory path in Admin -> Settings -> Media to /listmonk/uploads

  # listmonk init
  listmonk-init:
    image: alpine:latest
    container_name: listmonk_init
    depends_on:
      - listmonk-app
    volumes:
      - ./listmonk:/init
    env_file:
      - .env
    environment:
      LISTMONK_ADMIN_API_USER: ${LISTMONK_ADMIN_API_USER:-admin-api}
    command: >
      sh -c "
        apk add --no-cache curl jq &&
        chmod +x /init/init-listmonk.sh &&
        /init/init-listmonk.sh
      "

  # Postgres database
  listmonk-db:
    image: postgres:18-alpine
    container_name: listmonk_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"                                 # Only bind on the local interface. To connect to Postgres externally, change this to 0.0.0.0
    environment:
      <<: *db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ./volumes/listmonk-data:/var/lib/postgresql

  # SMTP server for development/testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    volumes:
      - ./volumes/mailpit-data:/data


